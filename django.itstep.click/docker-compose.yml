version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    image: maxslipchuk22/django-api-p32:latest
    container_name: django-api-p32
    restart: always
    ports:
      - "4512:8000"
    depends_on:
      - db
    env_file:
      - .env
    command: python manage.py runserver 0.0.0.0:8000
  front:
    image: maxslipchuk22/my-post:latest
    container_name: react_front
    ports:
      - "4518:80"
volumes:
  postgres_data: